<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Quiz - Trang Chủ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AWS Certification Quiz</h1>
            <p class="subtitle">Luyện tập các câu hỏi trắc nghiệm AWS</p>
        </header>
        
        <main>
            <div class="quiz-sets">
                <h2>Chọn Bộ Đề</h2>
                <div id="loading-message" style="text-align: center; padding: 40px;">
                    <p>🔍 Đang tìm kiếm các bộ đề...</p>
                </div>
                <div class="sets-grid" id="sets-grid" style="display: none;">
                    <!-- Question sets will be dynamically inserted here -->
                </div>
            </div>
        </main>
    </div>
    
    <!-- Auto-load questions system -->
    <script src="auto-load-questions.js"></script>
    
    <!-- Main script for index page -->
    <script>
        // Wait for questions to be loaded
        document.addEventListener('questionsLoaded', function(e) {
            const { totalSets, sets } = e.detail;
            
            console.log(`✅ Rendering ${totalSets} question sets on homepage`);
            
            // Hide loading message
            document.getElementById('loading-message').style.display = 'none';
            
            // Show grid
            const grid = document.getElementById('sets-grid');
            grid.style.display = 'grid';
            
            // Clear existing content
            grid.innerHTML = '';
            
            // Create a card for each set
            sets.forEach(setInfo => {
                const card = document.createElement('div');
                card.className = 'set-card';
                card.onclick = () => startQuiz(setInfo.setNumber);
                
                card.innerHTML = `
                    <h3>Bộ Đề ${setInfo.setNumber}</h3>
                    <p>${setInfo.questionCount} câu hỏi</p>
                    <button class="btn-start">Bắt Đầu</button>
                `;
                
                grid.appendChild(card);
            });
            
            console.log('✅ Homepage rendered successfully');
        });
        
        // Start loading questions
        autoLoadAllQuestions();
        
        // Function to start a quiz
        function startQuiz(setNumber) {
            localStorage.setItem('currentSet', setNumber);
            localStorage.setItem('currentQuestion', 1);
            window.location.href = 'quiz.html';
        }
    </script>
</body>
</html>
